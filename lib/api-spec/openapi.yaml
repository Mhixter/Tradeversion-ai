  /portfolio/account-summary:
    get:
      operationId: getAccountSummary
      tags: [portfolio]
      summary: Get account summary per broker
      responses:
        "200":
          description: Account summary
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/AccountBrokerSummary"

  # ─── RISK CENTER ───────────────────────────────────────────────────────────────
  /risk/overview:
    get:
      operationId: getRiskOverview
      tags: [riskcenter]
      summary: Get risk overview metrics
      responses:
        "200":
          description: Risk overview
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/RiskOverview"

  /risk/exposure-breakdown:
    get:
      operationId: getRiskExposureBreakdown
      tags: [riskcenter]
      summary: Get exposure breakdown by asset class
      responses:
        "200":
          description: Exposure breakdown
          content:
            application/json:
