  /risk/top-positions:
    get:
      operationId: getRiskyPositions
      tags: [riskcenter]
      summary: Get top risky open positions
      responses:
        "200":
          description: Risky positions
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/RiskyPosition"

  /risk/stress-tests:
    get:
      operationId: getStressTests
      tags: [riskcenter]
      summary: Get stress test scenarios
      responses:
        "200":
          description: Stress tests
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/StressTest"

  /risk/summary:
    get:
      operationId: getRiskSummary
      tags: [riskcenter]
      summary: Get risk summary (equity, margin, exposure)
      responses:
        "200":
          description: Risk summary
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/RiskSummary"

  # ─── NOTIFICATIONS ─────────────────────────────────────────────────────────────
  /notifications:
    get:
      operationId: getNotifications
      tags: [notifications]
      summary: List all notifications
      responses:
        "200":
          description: Notifications
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Notification"

  /notifications/summary:
    get:
      operationId: getNotificationSummary
      tags: [notifications]
      summary: Get notification summary counts by type
      responses:
        "200":
          description: Notification summary
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/NotificationSummary"

  /notifications/{id}/read:
    patch:
      operationId: markNotificationRead
      tags: [notifications]
      summary: Mark notification as read
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Notification marked as read
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Notification"

  /notifications/read-all:
    post:
      operationId: markAllNotificationsRead
      tags: [notifications]
      summary: Mark all notifications as read
      responses:
        "200":
          description: All marked as read

  # ─── TRADES ────────────────────────────────────────────────────────────────────
  /trades:
    get:
      operationId: getTrades
      tags: [trades]
      summary: List all trades
      responses:
        "200":
          description: Trade list
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Trade"

  /trades/analytics:
    get:
      operationId: getTradeAnalytics
      tags: [trades]
      summary: Get trade analytics summary
      responses:
        "200":
          description: Trade analytics
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/TradeAnalytics"

components:
  schemas:
    HealthStatus:
      type: object
      required: [status]
      properties:
        status:
          type: string

    # ─── DASHBOARD ─────────────────────────────────────────────────────────────
    DashboardSummary:
      type: object
      required: [totalEquity, dailyProfit, activeBots, winRate, totalReturn, sharpeRatio, maxDrawdown]
      properties:
        totalEquity:
          type: number
        dailyProfit:
          type: number
        activeBots:
          type: integer
        winRate:
          type: number
        totalReturn:
          type: number
        sharpeRatio:
          type: number
        maxDrawdown:
          type: number
        equityChange24h:
          type: number
        profitChange:
          type: number
        newBots:
          type: integer
        winRateChange:
          type: number

    EquityPoint:
      type: object
      required: [date, equity]
      properties:
        date:
          type: string
        equity:
          type: number
        buyHold:
          type: ["number", "null"]

    AISignal:
      type: object
      required: [id, symbol, direction, confidence, price, change, assetClass]
      properties:
        id:
          type: integer
        symbol:
          type: string
        direction:
          type: string
          enum: [BUY, SELL]
        confidence:
          type: integer
        price:
          type: number
