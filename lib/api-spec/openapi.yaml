  /marketplace/highlights:
    get:
      operationId: getMarketplaceHighlights
      tags: [marketplace]
      summary: Get marketplace highlights (top performers, editor's choice, etc.)
      responses:
        "200":
          description: Marketplace highlights
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/MarketplaceHighlights"

  /marketplace/top-authors:
    get:
      operationId: getTopAuthors
      tags: [marketplace]
      summary: Get top strategy authors
      responses:
        "200":
          description: Top authors
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/StrategyAuthor"

  /marketplace/{id}/subscribe:
    post:
      operationId: subscribeToStrategy
      tags: [marketplace]
      summary: Subscribe to a marketplace strategy
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Subscribed
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/MarketplaceListing"

  # ─── BACKTESTING ───────────────────────────────────────────────────────────────
  /backtests:
    get:
      operationId: getBacktests
      tags: [backtesting]
      summary: List backtest runs
      responses:
        "200":
          description: Backtests
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Backtest"
    post:
      operationId: runBacktest
      tags: [backtesting]
      summary: Run a new backtest
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/BacktestInput"
      responses:
        "201":
          description: Backtest started
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Backtest"

  /backtests/{id}:
    get:
      operationId: getBacktest
      tags: [backtesting]
      summary: Get a backtest result
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Backtest
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Backtest"

  /backtests/{id}/trades:
    get:
      operationId: getBacktestTrades
      tags: [backtesting]
      summary: Get trades from a backtest
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Backtest trades
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/BacktestTrade"

  /backtests/{id}/equity-curve:
    get:
      operationId: getBacktestEquityCurve
      tags: [backtesting]
      summary: Get equity curve for a backtest
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Equity curve
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/EquityPoint"

  /backtests/{id}/monthly-performance:
    get:
      operationId: getBacktestMonthlyPerformance
      tags: [backtesting]
      summary: Get monthly performance by period for a backtest
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Monthly performance
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/MonthlyPerformance"

  # ─── COPY TRADING ──────────────────────────────────────────────────────────────
  /copy-trading/traders:
    get:
      operationId: getCopyTraders
      tags: [copytrading]
      summary: List available master traders to copy
      responses:
        "200":
          description: Traders
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/MasterTrader"

  /copy-trading/following:
    get:
