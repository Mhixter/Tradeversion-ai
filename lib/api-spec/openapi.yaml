openapi: 3.1.0
info:
  title: Api
  version: 0.1.0
  description: TradeVision AI - Enterprise AI Trading Automation Platform
servers:
  - url: /api
    description: Base API path
tags:
  - name: health
  - name: dashboard
  - name: bots
  - name: strategies
  - name: marketplace
  - name: portfolio
  - name: backtesting
  - name: copytrading
  - name: riskcenter
  - name: notifications
  - name: brokers
  - name: trades

paths:
  /healthz:
    get:
      operationId: healthCheck
      tags: [health]
      summary: Health check
      responses:
        "200":
          description: Healthy
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HealthStatus"

  # ─── DASHBOARD ───────────────────────────────────────────────────────────────
  /dashboard/summary:
    get:
      operationId: getDashboardSummary
      tags: [dashboard]
      summary: Get dashboard summary stats
      responses:
        "200":
          description: Dashboard summary
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DashboardSummary"

  /dashboard/equity-curve:
    get:
      operationId: getEquityCurve
      tags: [dashboard]
      summary: Get equity curve data points
      responses:
        "200":
          description: Equity curve data
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/EquityPoint"

  /dashboard/recent-trades:
    get:
      operationId: getDashboardRecentTrades
      tags: [dashboard]
      summary: Get recent trades for dashboard
      responses:
        "200":
          description: Recent trades
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/RecentTrade"

  /dashboard/signals:
    get:
      operationId: getDashboardSignals
      tags: [dashboard]
      summary: Get AI signals for dashboard
      responses:
        "200":
          description: AI signals
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/AISignal"

  /dashboard/active-bots:
    get:
      operationId: getDashboardActiveBots
      tags: [dashboard]
      summary: Get active bots summary
      responses:
        "200":
          description: Active bots
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/BotSummary"

  /dashboard/connected-accounts:
    get:
      operationId: getDashboardConnectedAccounts
      tags: [dashboard]
      summary: Get connected broker accounts
      responses:
        "200":
          description: Connected accounts
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/BrokerAccount"

  # ─── BROKERS ─────────────────────────────────────────────────────────────────
  /brokers:
    get:
      operationId: getBrokers
      tags: [brokers]
      summary: List all broker connections
      responses:
        "200":
          description: Broker list
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/BrokerAccount"
    post:
      operationId: connectBroker
      tags: [brokers]
      summary: Connect a new broker account
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/BrokerInput"
      responses:
        "201":
          description: Broker connected
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/BrokerAccount"

  /brokers/{id}:
    delete:
      operationId: disconnectBroker
      tags: [brokers]
      summary: Disconnect a broker
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "204":
          description: Disconnected

  # ─── BOTS ─────────────────────────────────────────────────────────────────────
  /bots:
    get:
      operationId: getBots
      tags: [bots]
      summary: List all trading bots
      responses:
        "200":
          description: Bot list
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Bot"
    post:
      operationId: createBot
      tags: [bots]
      summary: Create a new bot
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/BotInput"
      responses:
        "201":
          description: Bot created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Bot"

  /bots/stats:
    get:
      operationId: getBotsStats
      tags: [bots]
      summary: Get bot manager aggregate stats
      responses:
        "200":
          description: Bots stats
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/BotStats"

  /bots/top-performing:
    get:
      operationId: getTopPerformingBots
      tags: [bots]
      summary: Get top performing bots
      responses:
        "200":
          description: Top bots
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/BotPerformance"

  /bots/performance-chart:
    get:
      operationId: getBotPerformanceChart
      tags: [bots]
      summary: Get bots overall performance chart data
      responses:
        "200":
          description: Chart data
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/EquityPoint"

  /bots/{id}:
    get:
      operationId: getBot
      tags: [bots]
      summary: Get a specific bot
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Bot
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Bot"
    patch:
      operationId: updateBot
      tags: [bots]
      summary: Update bot settings
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/BotUpdate"
      responses:
        "200":
          description: Bot updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Bot"
    delete:
      operationId: deleteBot
      tags: [bots]
      summary: Delete a bot
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "204":
          description: Deleted

  /bots/{id}/start:
    post:
      operationId: startBot
      tags: [bots]
      summary: Start a bot
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Bot started
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Bot"

  /bots/{id}/stop:
    post:
      operationId: stopBot
      tags: [bots]
      summary: Stop a bot
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Bot stopped
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Bot"

  /bots/{id}/pause:
    post:
      operationId: pauseBot
      tags: [bots]
      summary: Pause a bot
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Bot paused
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Bot"

  /bots/logs:
    get:
      operationId: getBotLogs
      tags: [bots]
      summary: Get live bot logs
      responses:
        "200":
          description: Bot logs
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/BotLog"

  # ─── STRATEGIES ────────────────────────────────────────────────────────────────
  /strategies:
    get:
      operationId: getStrategies
      tags: [strategies]
      summary: List strategies
      responses:
        "200":
          description: Strategy list
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Strategy"
    post:
      operationId: createStrategy
      tags: [strategies]
      summary: Create a strategy
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/StrategyInput"
      responses:
        "201":
          description: Strategy created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Strategy"

  /strategies/{id}:
    get:
      operationId: getStrategy
      tags: [strategies]
      summary: Get a strategy
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Strategy
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Strategy"
    patch:
      operationId: updateStrategy
      tags: [strategies]
      summary: Update a strategy
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/StrategyUpdate"
      responses:
        "200":
          description: Strategy updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Strategy"

  /strategies/{id}/deploy:
    post:
      operationId: deployStrategy
      tags: [strategies]
      summary: Deploy strategy to broker
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/DeployInput"
      responses:
        "200":
          description: Deployed
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Strategy"

  /strategies/{id}/backtest-preview:
    get:
      operationId: getStrategyBacktestPreview
      tags: [strategies]
      summary: Get backtest preview for a strategy
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Backtest preview
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/BacktestSummary"

