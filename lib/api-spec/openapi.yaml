          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/CopyPosition"

  /copy-trading/stats:
    get:
      operationId: getCopyTradingStats
      tags: [copytrading]
      summary: Get copy trading aggregate stats
      responses:
        "200":
          description: Copy trading stats
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CopyTradingStats"

  /copy-trading/strategies:
    get:
      operationId: getCopyTradingStrategies
      tags: [copytrading]
      summary: Get top copy trading strategies
      responses:
        "200":
          description: Strategies
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/CopyStrategy"

  /copy-trading/{traderId}/follow:
    post:
      operationId: followTrader
      tags: [copytrading]
      summary: Start copying a trader
      parameters:
        - name: traderId
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/FollowInput"
      responses:
        "200":
          description: Following
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CopyPosition"

  # ─── PORTFOLIO ─────────────────────────────────────────────────────────────────
  /portfolio/overview:
    get:
      operationId: getPortfolioOverview
      tags: [portfolio]
      summary: Get portfolio overview stats
      responses:
        "200":
          description: Portfolio overview
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PortfolioOverview"

  /portfolio/equity-curve:
    get:
      operationId: getPortfolioEquityCurve
      tags: [portfolio]
      summary: Get portfolio equity curve
      responses:
        "200":
          description: Equity curve
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/EquityPoint"

  /portfolio/allocation:
    get:
      operationId: getPortfolioAllocation
      tags: [portfolio]
      summary: Get asset allocation breakdown
      responses:
        "200":
          description: Allocation
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/AllocationItem"

  /portfolio/holdings:
    get:
      operationId: getPortfolioHoldings
      tags: [portfolio]
      summary: Get holdings overview
      responses:
